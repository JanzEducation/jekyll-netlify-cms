layout: default
title: "AI Image Generator | Janz Tales"
---

<div style="max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-family: sans-serif;">
    <h2 style="color: #1e3a8a; margin-top: 0;">Janz AI Image Generator</h2>
    <p style="color: #555;">हिंदी में सोचें, AI में देखें! (100% Free)</p>
    
    <input type="text" id="promptBox" style="width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px;" placeholder="जैसे: बारिश में चाय पीता हुआ एक रोबोट..." />
    <button id="btn" onclick="makeImage()" style="background: #2563eb; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer;">जादू देखें 🚀</button>
    <p id="status" style="color: #ea580c; font-weight: bold; display: none; margin-top: 15px;">फोटो बन रही है, 10-15 सेकंड रुकें...</p>

    <div id="result" style="display: none; margin-top: 20px;">
        <h3 style="color: #16a34a;">ये रही आपकी शानदार इमेज! 🎉</h3>
        <img id="finalImg" src="" style="width: 100%; border-radius: 8px; border: 3px solid #16a34a; box-shadow: 0 4px 8px rgba(0,0,0,0.2);" />
        <br><br>
        <a id="downloadBtn" href="" download="Janz_AI_Image.jpg" style="background: #16a34a; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; display: inline-block; font-weight: bold; font-size: 16px;">⬇️ इमेज डाउनलोड करें</a>
    </div>
</div>

<script>
    async function makeImage() {
        const prompt = document.getElementById('promptBox').value;
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const finalImg = document.getElementById('finalImg');
        const downloadBtn = document.getElementById('downloadBtn');

        if(!prompt) { alert("अरे भाई, पहले बॉक्स में कुछ तो लिख!"); return; }

        btn.disabled = true;
        btn.style.background = "#94a3b8";
        status.style.display = "block";
        result.style.display = "none";

        try {
            // 👇 तेरा लाइव Render लिंक यहाँ सेट कर दिया है 👇
            const server_url = "https://janz-ai-server-1.onrender.com/generate-image";

            const res = await fetch(server_url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: prompt })
            });

            if(!res.ok) throw new Error("सर्वर बिज़ी है, प्रॉम्प्ट बदलकर दोबारा ट्राई करें!");

            const blob = await res.blob();
            const imgUrl = URL.createObjectURL(blob);
            
            finalImg.src = imgUrl;
            downloadBtn.href = imgUrl;
            
            status.style.display = "none";
            result.style.display = "block";
        } catch (e) {
            alert("❌ एरर: " + e.message);
            status.style.display = "none";
        } finally {
            btn.disabled = false;
            btn.style.background = "#2563eb";
        }
    }
              </script>
